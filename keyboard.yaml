            double-sharp.skip: true
            natural.skip: true
            flat.skip: true
            double-flat.skip: true
          key.stagger: p
        C:
          rows:
            flat.skip: true
            double-flat.skip: true
          key.stagger: -p
        D:
          key.stagger: p
        E:
          rows:
            double-sharp.skip: true
          key.stagger: p
        F:
          rows:
            double-flat.skip: true
          key.stagger: -p
        G:
          key.stagger: p
        A:
          key.stagger: p
        B:
          rows:
            sharp.skip: true
            double-sharp.skip: true
          key.stagger: p
        c:
          rows:
            double-sharp.skip: true
            sharp.skip: true
            natural.skip: true
            double-flat.skip: true
          key.stagger: -p
      rows:
        double-flat:
        flat:
          shift: [0, 2o]
        natural:
          shift: [0, 2o]
        sharp:
          shift: [0, 2o]
        double-sharp:
          shift: [0, 2o]
