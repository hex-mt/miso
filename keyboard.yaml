units:
  o: 0.1339745962155614u # 1 - (sqrt(3) / 2)
  p: .5u + o
points:
  zones:
    matrix:
      columns:
        extra-before:
          rows:
            third.skip: true
            fourth.skip: true
            fifth.skip: true
          key.stagger: p
        A:
          rows:
            fifth.skip: true
          key.stagger: p
        B:
          rows:
            first.skip: true
          key.stagger: p
        C:
          rows:
            fifth.skip: true
          key.stagger: -p
        D:
          key.stagger: p
        E:
          rows:
            first.skip: true
          key.stagger: p
        F:
          rows:
            fifth.skip: true
          key.stagger: -p
        G:
          rows:
            first.skip: true
            second.skip: true
          key.stagger: p
        extra-after:
          rows:
            first.skip: true
            second.skip: true
            third.skip: true
            fifth.skip: true
          key.stagger: -p
      rows:
        fifth:
        fourth:
          shift: [0, 2o]
        third:
          shift: [0, 2o]
        second:
          shift: [0, 2o]
        first:
          shift: [0, 2o]
  rotate: -17
outlines:
  keys:
    - what: rectangle
      where: true
      bound: false
      size: [14.0, 14.0]
  preview:
    - what: outline
      name: keys
      operation: stack
