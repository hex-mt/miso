units:
  spacing: 22.5
  
  k: 1.73205080757 # sqrt(3)
  spread: spacing * k / 2
  stagger: spacing / 2
  hex_x: spacing / 2k
  hex_y: spacing / 2
points:
  zones:
    matrix:
      key.spread: spread
      key.padding: spacing
      columns:
        extra_before:
          rows:
            third.skip: true
            fourth.skip: true
            fifth.skip: true
        A:
          key.stagger: stagger
          rows:
            fifth.skip: true
        B:
          key.stagger: stagger
          rows:
            first.skip: true
        C:
          key.stagger: -stagger
          rows:
            fifth.skip: true
        D:
          key.stagger: stagger
        E:
          key.stagger: -stagger
          rows:
            fifth.skip: true
        F:
          key.stagger: stagger
          rows:
            fifth.skip: true
        G:
          key.stagger: stagger
          rows:
            first.skip: true
            second.skip: true
        extra_after:
          key.stagger: stagger
          rows:
            first.skip: true
            second.skip: true
            third.skip: true
            fourth.skip: true
      rows:
        fifth:
        fourth:
        third:
        second:
        first:
  # rotate: -13.9
outlines:
  raw:
    - what: polygon
      where:
        # - matrix_D_second
        - true
      bound: false
      points:
        - shift: [-hex_x, hex_y]
        - shift: [2*hex_x, 0]
        - shift: [hex_x, -hex_y]
        - shift: [-hex_x, -hex_y]
        - shift: [-2*hex_x, 0]
        - shift: [-hex_x, hex_y]
  keys:
    - what: rectangle
      where: true
      bound: false
      size: [14.0, 14.0]
  preview:
    - what: outline
      name: raw
    - what: outline
      name: keys
      operation: stack
