units:
  # scale_factor to control key sizing. 1.5 ~= 22.5mm spacing between adjacent keys.
  scale_factor: 1.5
  
  k: 0.8660254037844386 # sqrt(3)/2
  spacing: scale_factor * (1 - k)u
  stagger: .5u + spacing/2
  spread: (u + spacing)k
  hex: (spread + spacing)/2 + 0.175
points:
  zones:
    matrix:
      columns:
        extra-before:
          rows:
            third.skip: true
            fourth.skip: true
            fifth.skip: true
          key.stagger: stagger
        A:
          rows:
            fifth.skip: true
          key.stagger: stagger
          key.spread: spread
        B:
          rows:
            first.skip: true
          key.stagger: stagger
          key.spread: spread
        C:
          rows:
            fifth.skip: true
          key.stagger: -stagger
          key.spread: spread
        D:
          key.stagger: stagger
          key.spread: spread
        E:
          rows:
            first.skip: true
          key.stagger: stagger
          key.spread: spread
        F:
          rows:
            fifth.skip: true
          key.stagger: -stagger
          key.spread: spread
        G:
          rows:
            first.skip: true
            second.skip: true
          key.stagger: stagger
          key.spread: spread
        extra-after:
          rows:
            first.skip: true
            second.skip: true
            third.skip: true
            fifth.skip: true
          key.stagger: -stagger
          key.spread: spread
      rows:
        fifth:
        fourth:
          shift: [0, spacing]
        third:
          shift: [0, spacing]
        second:
          shift: [0, spacing]
        first:
          shift: [0, spacing]
  # rotate: -13.9
outlines:
  raw:
    - what: polygon
      where:
        # - matrix_D_second
        - true
      bound: false
      points:
        - shift: [-hex/2k, hex]
        - shift: [hex/k, 0]
        - shift: [hex/2k, -hex]
        - shift: [-hex/2k, -hex]
        - shift: [-hex/k, 0]
        - shift: [-hex/2k, hex]
  keys:
    - what: rectangle
      where: true
      bound: false
      size: [14.0, 14.0]
  preview:
    - what: outline
      name: raw
    - what: outline
      name: keys
      operation: stack
